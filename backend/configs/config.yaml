# ============================================================
# 项目名称：网吧计费管理系统 - 开发环境配置文件
# 适用环境：本地开发 / 调试
# ============================================================

# ------------------------------------------------------------
# 1. 服务端配置
# ------------------------------------------------------------
server:
  port: 8080                      # 服务监听端口
  mode: debug                     # Gin 运行模式: debug / release / test
  read_timeout: 30s               # 请求读取超时
  write_timeout: 30s              # 响应写入超时

# ------------------------------------------------------------
# 2. 数据库配置
# ------------------------------------------------------------
database:
  host: localhost                 # 数据库主机地址
  port: 3306                      # 端口
  username: root                  # 用户名
  password: "wyy050811"              # 密码（开发环境可明文）
  dbname: internet_cafe           # 数据库名称
  charset: utf8mb4                # 字符集（支持 emoji）
  parse_time: true                # 自动解析 DATETIME 为 time.Time
  loc: Local                      # 时区
  max_idle_conns: 10              # 最大空闲连接数
  max_open_conns: 100             # 最大打开连接数
  conn_max_lifetime: 3600s        # 连接最大存活时间

# ------------------------------------------------------------
# 3. JWT 认证配置
# ------------------------------------------------------------
jwt:
  secret_key: "dev-secret-key-change-in-production"  # 签名密钥（生产环境务必更换）
  access_expire: 1440m            # Access Token 有效期（24小时）
  refresh_expire: 10080m          # Refresh Token 有效期（7天）
  issuer: "internet-cafe-system"  # 签发者标识

# ------------------------------------------------------------
# 4. 日志配置
# ------------------------------------------------------------
log:
  level: debug                    # 日志级别: debug / info / warn / error
  output: stdout                  # 输出位置: stdout / stderr / 文件路径
  format: text                    # 格式: text / json

# ------------------------------------------------------------
# 5. 计费引擎配置
# ------------------------------------------------------------
billing:
  # 上机最低预扣金额（防止余额不足的会员长期占用机位）
  min_pre_deduct: 5.00
  # 计费精度（保留小数位数）
  precision: 2
  # 是否启用通宵场自动跨天计算
  enable_overnight: true

# ------------------------------------------------------------
# 6. 限流配置
# ------------------------------------------------------------
rate_limit:
  # 每个 IP 每分钟最大请求数
  requests_per_minute: 100
  # 突发流量允许的额外请求数
  burst: 20

# ------------------------------------------------------------
# 7. 跨域配置（CORS）
# ------------------------------------------------------------
cors:
  allow_origins:
    - "http://localhost:5173"      # Vite 默认开发端口
    - "http://localhost:3000"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Authorization
    - Content-Type
    - X-Requested-With
  allow_credentials: true
  max_age: 86400                   # 预检请求缓存时间（秒）

# ------------------------------------------------------------
# 8. 系统初始化配置
# ------------------------------------------------------------
initialization:
  # 首次启动是否自动创建管理员账号
  create_admin: true
  admin_username: admin
  admin_password: "123456"         # 首次登录后强制修改
  # 是否导入预设计费规则
  seed_rate_rules: true